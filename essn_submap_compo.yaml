# =============================================================================
# essn_submap Component Config
# =============================================================================
# Tunable parameters for essn_submap.SubmapProcessor — per-submap processing
# pipeline.
#
# Owns the Pi3X model, GTSAM SL(4) pose graph, SALAD image retrieval,
# Viser viewer, and COLMAP exporter. Processes one submap at a time through
# the full reconstruction pipeline.
# =============================================================================

# -- Model --------------------------------------------------------------------
# Path to Pi3X model checkpoint (safetensors format).
ckpt_path: null  # REQUIRED — no default

# Compute device: "cuda" or "cpu".
device: "cuda"

# Floating point precision: "float16" or "bfloat16".
# float16 for most GPUs; bfloat16 for compute capability >= 8.
dtype: "float16"

# -- Image preprocessing ------------------------------------------------------
# Max pixels per image. Controls resolution vs VRAM tradeoff.
# 255000 ≈ ~500x510. Lower = less VRAM, faster inference.
pixel_limit: 255000

# ViT patch size for dimension alignment. Images are resized to multiples of this.
patch_size: 14

# -- Confidence filtering ------------------------------------------------------
# Percentile threshold for point confidence.
# 50.0 = keep top 50% of points.
# 90.0 = keep only top 10% (very selective).
conf_threshold: 50.0

# Absolute sigmoid confidence floor (0.0–1.0).
# Points with sigmoid(logit) < this are always discarded regardless of percentile.
# 0.0 = disabled, 0.95 = very strict.
conf_min_abs: 0.0

# -- Loop closure --------------------------------------------------------------
# Max loop closures to attempt per submap. 0 = disabled.
max_loops: 1

# SALAD L2 distance threshold for loop closure candidate retrieval.
# Lower = stricter matching. Typical range: [0.5, 2.0].
lc_retrieval_threshold: 0.95

# Mean sigmoid confidence threshold for loop closure verification.
# The 2-frame Pi3X run must exceed this to accept the loop closure.
# Higher = stricter. Range: [0.0, 1.0].
lc_conf_threshold: 0.25

# -- Visualization -------------------------------------------------------------
# Voxel size for point cloud downsampling in viewer. null = no downsampling.
vis_voxel_size: null

# -- Debug ---------------------------------------------------------------------
# Directory for per-stitch overlap PLY + cumulative point clouds. null = disabled.
stitch_debug_dir: null
